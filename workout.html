<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recovery Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #EAF2EF;
    --surface: #FFFFFF;
    --ink: #15302B;
    --muted: #5E7873;
    --faint: #8AA39D;
    --line: #DCE7E3;
    --primary: #11876F;
    --primary-deep: #0B5F4E;
    --mint: #54C9A6;
    --mint-soft: #E3F5EE;
    --amber: #C9842F;
    --amber-soft: #FBF0DF;
    --shadow: 0 1px 2px rgba(16,48,42,.04), 0 8px 24px rgba(16,48,42,.06);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px 64px;
  }

  h1, h2, h3, .display { font-family: 'Outfit', sans-serif; }

  /* ---------- Header ---------- */
  .head {
    position: sticky;
    top: 0;
    z-index: 20;
    background: linear-gradient(var(--bg) 78%, rgba(234,242,239,0));
    padding: 22px 0 14px;
  }
  .head .eyebrow {
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 600;
  }
  .head h1 {
    font-size: 27px;
    font-weight: 700;
    letter-spacing: -.02em;
    margin-top: 3px;
  }

  /* ---------- Program switcher tiles ---------- */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 14px 0 4px;
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    padding: 12px 6px 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    color: var(--muted);
    transition: border-color .2s, background .2s, color .2s, box-shadow .2s;
  }
  .tab .tab-ic {
    width: 34px; height: 34px;
    display: grid; place-items: center;
    border-radius: 11px;
    background: var(--mint-soft);
    color: var(--primary-deep);
    transition: background .2s, color .2s;
  }
  .tab .tab-ic svg { width: 20px; height: 20px; }
  .tab .tab-lbl { line-height: 1.15; text-align: center; }
  .tab:hover { border-color: var(--mint); }
  .tab.active {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
    box-shadow: var(--shadow);
  }
  .tab.active .tab-ic { background: rgba(255,255,255,.18); color: #fff; }
  .tab:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 2px; }

  /* ---------- Today summary ---------- */
  .summary {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    margin: 14px 0 22px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .ring { flex: 0 0 auto; }
  .ring text {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
  }
  .summary .info { flex: 1; }
  .summary .label {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--faint); font-weight: 600;
  }
  .summary .count {
    font-family: 'Outfit', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: -.01em;
    margin-top: 1px;
  }
  .summary .count b { color: var(--primary); }
  .summary .sub { font-size: 13.5px; color: var(--muted); margin-top: 2px; }

  /* ---------- Card deck (cards stacked one behind another) ---------- */
  .deck {
    position: relative;
    margin: 8px 0 24px;
    transition: height .34s cubic-bezier(.22,.61,.36,1);
  }
  .deck-done {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 4px;
  }
  .deck.empty .deck-done { display: flex; }
  .deck-done svg { width: 42px; height: 42px; color: var(--mint); margin-bottom: 4px; }
  .deck-done .big {
    font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px;
    color: var(--primary-deep);
  }
  .deck-done .small { font-size: 13.5px; color: var(--muted); }

  .ex {
    position: absolute;
    top: 0; left: 0; right: 0;
    transform-origin: top center;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    touch-action: pan-y;
    will-change: transform;
    transition: transform .34s cubic-bezier(.22,.61,.36,1),
                opacity .3s ease,
                box-shadow .3s ease,
                border-color .25s;
  }
  .ex:not(.front) { pointer-events: none; }
  .ex.complete { border-color: var(--mint); }
  .ex.dragging { transition: none; user-select: none; cursor: grabbing; }
  .ex.dismissed { pointer-events: none; }

  /* swipe affordance revealed as you drag the front card */
  .swipe-hint {
    position: absolute; inset: 0; z-index: 6;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    background: var(--primary); color: #fff;
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 15px; letter-spacing: .01em;
    opacity: 0; pointer-events: none;
    transition: opacity .15s ease;
  }
  .ex.dragging .swipe-hint { opacity: 1; }
  .swipe-hint svg { width: 20px; height: 20px; }

  /* ---------- Video media (YouTube click-to-play facade) ---------- */
  .media {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0b1f1b;
    overflow: hidden;
    cursor: pointer;
    touch-action: pan-y;
  }
  .media-thumb {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; display: block; border: 0;
  }
  .media-fallback { position: absolute; inset: 0; display: none; }
  .media-fallback svg { width: 100%; height: 100%; display: block; }
  .media.noimg .media-thumb { display: none; }
  .media.noimg .media-fallback { display: block; }
  .media::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,.30));
    pointer-events: none; transition: opacity .2s; z-index: 1;
  }
  .play {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    width: 58px; height: 58px; border-radius: 50%;
    background: rgba(255,255,255,.93);
    display: grid; place-items: center; z-index: 2;
    box-shadow: 0 6px 18px rgba(0,0,0,.28);
    transition: transform .2s; pointer-events: none;
  }
  .media:hover .play { transform: translate(-50%,-50%) scale(1.07); }
  .play svg { width: 23px; height: 23px; margin-left: 3px; color: var(--primary-deep); }
  .media-label {
    position: absolute; left: 11px; bottom: 9px; z-index: 2;
    color: #fff; font-size: 11.5px; font-weight: 600; letter-spacing: .02em;
    text-shadow: 0 1px 4px rgba(0,0,0,.55); pointer-events: none;
  }
  .media.playing .play,
  .media.playing .media-label,
  .media.playing::after { display: none; }
  .media iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: 0; z-index: 3;
  }

  .ex-body { padding: 15px 16px 4px; }
  .ex-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 18px;
    letter-spacing: -.01em; line-height: 1.22;
  }
  .freq {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 9px;
    font-size: 12px; font-weight: 600;
    color: var(--primary-deep);
    background: var(--mint-soft);
    padding: 3px 9px; border-radius: 999px;
  }
  .freq svg { width: 12px; height: 12px; }

  .metrics {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .metric {
    background: #F4F8F6;
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 6px 11px;
    text-align: center;
    min-width: 54px;
  }
  .metric .v {
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 16px; color: var(--ink);
    line-height: 1.1;
  }
  .metric .k {
    font-size: 10.5px; letter-spacing: .05em; text-transform: uppercase;
    color: var(--faint); font-weight: 600; margin-top: 1px;
  }

  /* set tracker */
  .sets {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0 2px;
    flex-wrap: wrap;
  }
  .sets .stitle {
    font-size: 12px; font-weight: 600; color: var(--muted);
    letter-spacing: .03em;
  }
  .pips { display: flex; gap: 7px; }
  .pip {
    width: 30px; height: 30px;
    border-radius: 9px;
    border: 1.5px solid var(--line);
    background: #fff;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-weight: 700; font-size: 12px;
    color: var(--faint);
    display: grid; place-items: center;
    transition: all .18s;
  }
  .pip:hover { border-color: var(--primary); color: var(--primary); }
  .pip.on {
    background: var(--primary); border-color: var(--primary); color: #fff;
    transform: scale(1.04);
  }
  .pip:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 2px; }

  /* instructions */
  .toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    padding: 13px 16px;
    margin-top: 6px;
    border: none; border-top: 1px solid var(--line);
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 13.5px; color: var(--primary-deep);
    cursor: pointer;
    letter-spacing: .01em;
  }
  .toggle .chev { transition: transform .25s; }
  .ex.open .toggle .chev { transform: rotate(180deg); }
  .toggle:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; }

  .details {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .3s ease;
  }
  .ex.open .details { grid-template-rows: 1fr; }
  .details-inner { overflow: hidden; }
  .block { padding: 4px 18px 16px; }
  .block:first-child { padding-top: 14px; }
  .block .btag {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    font-weight: 700; color: var(--primary);
    display: inline-block; margin-bottom: 5px;
  }
  .block p { font-size: 14px; color: var(--ink); }
  .block.tip {
    background: var(--amber-soft);
    margin: 0 12px 14px;
    border-radius: 12px;
    padding: 12px 14px;
  }
  .block.tip .btag { color: var(--amber); }
  .block.tip p { color: #6e4d1f; }
  .block.tip p + p { margin-top: 6px; }

  /* complete button */
  .cta-wrap { padding: 4px 16px 16px; }
  .complete-btn {
    width: 100%;
    border: 1.5px solid var(--primary);
    background: #fff;
    color: var(--primary-deep);
    font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 14.5px;
    padding: 12px; border-radius: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .2s;
  }
  .complete-btn:hover { background: var(--mint-soft); }
  .complete-btn:focus-visible { outline: 2px solid var(--primary-deep); outline-offset: 2px; }
  .ex.complete .complete-btn {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }
  .complete-btn svg { width: 17px; height: 17px; }

  .footer-note {
    text-align: center; font-size: 12.5px; color: var(--faint);
    margin-top: 26px; line-height: 1.6;
  }

  @media (max-width: 380px) {
    .metric { min-width: 48px; padding: 6px 8px; }
    .ex-name { font-size: 16.5px; }
  }
</style>
</head>
<body>

<!-- Shared gradient palette for the exercise illustrations -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF8F4"/><stop offset="1" stop-color="#D4EAE1"/>
    </linearGradient>
    <linearGradient id="gSkin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6CDA8"/><stop offset="1" stop-color="#E4AA79"/>
    </linearGradient>
    <linearGradient id="gSkinD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E2AD83"/><stop offset="1" stop-color="#C98C5D"/>
    </linearGradient>
    <linearGradient id="gTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DB892"/><stop offset="1" stop-color="#0F7D67"/>
    </linearGradient>
    <linearGradient id="gBot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15745F"/><stop offset="1" stop-color="#0A4C40"/>
    </linearGradient>
    <linearGradient id="gMat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFE9DE"/><stop offset="1" stop-color="#AED4C7"/>
    </linearGradient>
    <linearGradient id="gWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9D0A1"/><stop offset="1" stop-color="#CFAE72"/>
    </linearGradient>
    <linearGradient id="gProp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BEDFD2"/><stop offset="1" stop-color="#93C3B5"/>
    </linearGradient>
    <linearGradient id="gWall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DDEEE7"/><stop offset="1" stop-color="#C5DCD3"/>
    </linearGradient>
  </defs>
</svg>

<main class="app">

  <header class="head">
    <div class="eyebrow" id="eyebrow">Daily Program</div>
    <h1 id="progTitle">Knee Recovery</h1>
  </header>

  <!-- Program switcher (tiles generated dynamically) -->
  <nav class="tabs" id="tabs" aria-label="Choose a program"></nav>

  <!-- Today summary -->
  <section class="summary">
    <svg class="ring" width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="27" fill="none" stroke="#E3F5EE" stroke-width="8"/>
      <circle id="ringFill" cx="32" cy="32" r="27" fill="none" stroke="#11876F" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"
        transform="rotate(-90 32 32)" style="transition:stroke-dashoffset .5s ease"/>
      <text id="ringPct" x="32" y="37" text-anchor="middle" font-size="15" fill="#0B5F4E">0%</text>
    </svg>
    <div class="info">
      <div class="label">Today</div>
      <div class="count"><b id="doneCount">0</b> of <span id="totalCount">5</span> exercises done</div>
      <div class="sub" id="summarySub">Tap sets to track reps · swipe a card away when done.</div>
    </div>
  </section>

  <!-- Exercise card deck (cards stacked one behind another) -->
  <section class="deck" id="deck" aria-label="Today's exercises">
    <div class="deck-done">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      <div class="big">All done for today</div>
      <div class="small">Great work — see you tomorrow.</div>
    </div>
  </section>

  <p class="footer-note">
    These exercises are part of a guided home program.<br>
    Stop and check with your therapist if anything causes sharp pain.
  </p>

</main>

<script>
/* ---------- Embedded illustrations (self-contained, gradient-shaded, never break) ---------- */
const HAIR = '#4A3526', SHOE = '#27433D';

function fig(inner){
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" role="img">`
    + `<rect width="100" height="100" fill="url(#gBg)"/>${inner}</svg>`;
}

const POSE = {
  // Lying on back: one knee bent, other leg lifted straight
  legraise: fig(`
    <rect x="3" y="75" width="94" height="11" rx="5.5" fill="url(#gMat)"/>
    <ellipse cx="50" cy="75" rx="33" ry="3.5" fill="#0B5F4E" opacity=".10"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M53 67 L70 57" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M70 57 L84 50" stroke="url(#gSkinD)" stroke-width="9"/>
      <path d="M84 50 L89 53" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M30 67 L54 67" stroke="url(#gTop)" stroke-width="15"/>
      <path d="M54 67 L61 52" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M61 52 L53 68" stroke="url(#gSkin)" stroke-width="9"/>
      <path d="M53 68 L48 70" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M39 65 L47 72" stroke="url(#gTop)" stroke-width="5.5"/>
    </g>
    <circle cx="24" cy="64" r="8.5" fill="url(#gSkin)"/>
    <path d="M16 62 A8.5 8.5 0 0 1 31 60" fill="none" stroke="${HAIR}" stroke-width="4" stroke-linecap="round"/>`),

  // Lying on side: top leg lifted toward ceiling
  sidelying: fig(`
    <rect x="3" y="76" width="94" height="11" rx="5.5" fill="url(#gMat)"/>
    <ellipse cx="54" cy="79" rx="36" ry="3" fill="#0B5F4E" opacity=".10"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M54 71 L72 72" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M72 72 L86 73" stroke="url(#gSkinD)" stroke-width="9"/>
      <path d="M86 73 L91 73" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M30 70 L54 71" stroke="url(#gTop)" stroke-width="15"/>
      <path d="M54 67 L71 55" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M71 55 L88 43" stroke="url(#gSkin)" stroke-width="9"/>
      <path d="M88 43 L93 44" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M40 66 L47 74" stroke="url(#gTop)" stroke-width="5.5"/>
    </g>
    <circle cx="24" cy="67" r="8.5" fill="url(#gSkin)"/>
    <path d="M16 65 A8.5 8.5 0 0 1 31 63" fill="none" stroke="${HAIR}" stroke-width="4" stroke-linecap="round"/>`),

  // Lying on a table, one knee held, opposite leg hanging off the edge
  stretch: fig(`
    <rect x="2" y="59" width="62" height="9" rx="3" fill="url(#gWood)"/>
    <rect x="9" y="68" width="6" height="27" rx="2" fill="#CBA86C"/>
    <rect x="52" y="68" width="6" height="27" rx="2" fill="#CBA86C"/>
    <ellipse cx="38" cy="57" rx="24" ry="2.5" fill="#0B5F4E" opacity=".10"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M51 57 L60 70" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M60 70 L66 82" stroke="url(#gSkinD)" stroke-width="9"/>
      <path d="M66 82 L64 90" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M22 55 L50 56" stroke="url(#gTop)" stroke-width="15"/>
      <path d="M50 56 L60 45" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M60 45 L51 56" stroke="url(#gSkin)" stroke-width="9"/>
      <path d="M51 56 L47 60" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M34 53 L52 50" stroke="url(#gTop)" stroke-width="5.5"/>
    </g>
    <circle cx="16" cy="53" r="8.5" fill="url(#gSkin)"/>
    <path d="M8 51 A8.5 8.5 0 0 1 23 49" fill="none" stroke="${HAIR}" stroke-width="4" stroke-linecap="round"/>`),

  // Rising from a chair, hands on knees
  sitstand: fig(`
    <rect x="4" y="86" width="92" height="7" rx="3" fill="url(#gMat)"/>
    <rect x="60" y="40" width="9" height="46" rx="3" fill="url(#gProp)"/>
    <rect x="44" y="63" width="26" height="8" rx="3" fill="url(#gProp)"/>
    <ellipse cx="48" cy="87" rx="22" ry="2.5" fill="#0B5F4E" opacity=".12"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40 36 L55 60" stroke="url(#gTop)" stroke-width="15"/>
      <path d="M55 60 L43 71" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M43 71 L45 84" stroke="url(#gSkin)" stroke-width="9"/>
      <path d="M45 84 L51 86" stroke="${SHOE}" stroke-width="7.5"/>
      <path d="M44 41 L44 68" stroke="url(#gTop)" stroke-width="5.5"/>
    </g>
    <circle cx="38" cy="29" r="8.5" fill="url(#gSkin)"/>
    <path d="M30 27 A8.5 8.5 0 0 1 46 26" fill="none" stroke="${HAIR}" stroke-width="4" stroke-linecap="round"/>`),

  // Plank against a wall, opposite arm and leg extended
  birddog: fig(`
    <rect x="85" y="3" width="12" height="92" fill="url(#gWall)"/>
    <rect x="4" y="86" width="92" height="7" rx="3" fill="url(#gMat)"/>
    <ellipse cx="40" cy="87" rx="28" ry="2.5" fill="#0B5F4E" opacity=".12"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 52 L72 53" stroke="url(#gBot)" stroke-width="10.5"/>
      <path d="M72 53 L84 55" stroke="url(#gSkinD)" stroke-width="8.5"/>
      <path d="M58 52 L40 70" stroke="url(#gTop)" stroke-width="15"/>

/* ---------- Render ---------- */
const deck = document.getElementById('deck');
let currentExercises = [];

function buildCard(ex) {
  const card = document.createElement('article');
  card.className = 'ex';

  const pips = Array.from({length: ex.sets}, (_, s) =>
    `<button class="pip" data-set="${s}" aria-label="Mark set ${s+1} complete">${s+1}</button>`).join('');

  const metrics = ex.metrics.map(m =>
    `<div class="metric"><div class="v">${m.v}</div><div class="k">${m.k}</div></div>`).join('');

  const tips = ex.tips.map(t => `<p>${t}</p>`).join('');

  card.innerHTML = `
    <div class="media" data-yt="${ex.yt}">
      <img class="media-thumb" loading="lazy" alt="${ex.name} — video demonstration"
        src="https://i.ytimg.com/vi/${ex.yt}/maxresdefault.jpg"
        onerror="if(!this.dataset.f){this.dataset.f=1;this.src='https://i.ytimg.com/vi/${ex.yt}/mqdefault.jpg';}else{this.closest('.media').classList.add('noimg');}">
      <div class="media-fallback">${POSE[ex.pose]}</div>
      <div class="play">${ICON_PLAY}</div>
      <span class="media-label">Watch demo</span>
    </div>

    <div class="ex-body">
      <div class="ex-name">${ex.name}</div>
      <span class="freq">${ICON_REPEAT}${ex.freq}</span>
      <div class="metrics">${metrics}</div>
      <div class="sets">
        <span class="stitle">Sets</span>
        <div class="pips">${pips}</div>
      </div>
    </div>

    <button class="toggle" aria-expanded="false">
      <span>Instructions</span>${ICON_CHEV}
    </button>

    <div class="details">
      <div class="details-inner">
        <div class="block"><span class="btag">Setup</span><p>${ex.setup}</p></div>
        <div class="block"><span class="btag">Movement</span><p>${ex.movement}</p></div>
        <div class="block tip"><span class="btag">Tip</span>${tips}</div>
      </div>
    </div>

    <div class="cta-wrap">
      <button class="complete-btn">${ICON_CHECK}<span class="cbtxt">Mark complete &amp; next</span></button>
    </div>

    <div class="swipe-hint" aria-hidden="true">${ICON_CHECK}<span>Done</span></div>
  `;

  // --- interactions ---
  const pipEls = card.querySelectorAll('.pip');
  const completeBtn = card.querySelector('.complete-btn');
  const cbtxt = card.querySelector('.cbtxt');
  const media = card.querySelector('.media');

  function syncFromPips() {
    const onCount = card.querySelectorAll('.pip.on').length;
    const all = onCount === ex.sets;
    card.classList.toggle('complete', all);
    cbtxt.textContent = all ? 'Completed — next' : 'Mark complete & next';
    updateSummary();
  }

  pipEls.forEach(p => p.addEventListener('click', () => {
    p.classList.toggle('on');
    syncFromPips();
  }));

  completeBtn.addEventListener('click', () => dismissCard(1));

  // tap the poster to load & play the YouTube demo
  media.addEventListener('click', () => {
    if (suppressClick) { suppressClick = false; return; }
    if (media.classList.contains('playing')) return;
    // YouTube blocks embeds loaded from a file:// (null) origin — error 153.
    // When opened as a local file, open the video on YouTube instead.
    if (location.protocol === 'file:') {
      window.open('https://www.youtube.com/watch?v=' + ex.yt, '_blank', 'noopener');
      return;
    }
    const ifr = document.createElement('iframe');
    ifr.src = `https://www.youtube-nocookie.com/embed/${ex.yt}?autoplay=1&rel=0&modestbranding=1&playsinline=1&origin=${encodeURIComponent(location.origin)}`;
    ifr.title = ex.name + ' video';
    ifr.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
    ifr.allowFullscreen = true;
    media.appendChild(ifr);
    media.classList.add('playing');
  });

  // expand/collapse instructions
  const toggle = card.querySelector('.toggle');
  toggle.addEventListener('click', () => {
    const open = card.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
    restack();
    setTimeout(restack, 340);
  });

  // --- swipe the front card to complete & advance ---
  const THRESH = 96;            // px past which a swipe commits
  let startX = 0, startY = 0, dx = 0;
  let dragging = false, decided = false, horizontal = false, suppressClick = false;

  function onDown(e) {
    if (!card.classList.contains('front')) return;
    startX = e.clientX; startY = e.clientY;
    dx = 0; dragging = true; decided = false; horizontal = false; suppressClick = false;
  }

  function onMove(e) {
    if (!dragging) return;
    const mx = e.clientX - startX, my = e.clientY - startY;
    if (!decided) {
      if (Math.abs(mx) > 8 || Math.abs(my) > 8) {
        decided = true;
        horizontal = Math.abs(mx) > Math.abs(my);
        if (horizontal) {
          card.classList.add('dragging');
          suppressClick = true;          // don't trigger video play after a swipe
          try { card.setPointerCapture(e.pointerId); } catch (_) {}
        }
      }
    }
    if (horizontal) {
      e.preventDefault();
      dx = mx;
      card.style.transform = `translateX(${dx}px) rotate(${dx * 0.025}deg)`;
      card.style.opacity = String(Math.max(.4, 1 - Math.abs(dx) / 360));
    }
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('dragging');
    if (horizontal && Math.abs(dx) > THRESH) {
      dismissCard(dx > 0 ? 1 : -1);
    } else {
      card.style.transform = '';
      card.style.opacity = '';
    }
  }

  function dismissCard(dir) {
    if (card.classList.contains('dismissed')) return;
    pipEls.forEach(p => p.classList.add('on'));
    syncFromPips();
    card.classList.add('dismissed');
    card.classList.remove('front');
    card.style.transition = 'transform .42s ease, opacity .42s ease';
    card.style.transform = `translateX(${dir * 540}px) rotate(${dir * 9}deg)`;
    card.style.opacity = '0';
    setTimeout(() => { card.style.visibility = 'hidden'; }, 440);
    restack();
  }

  card.addEventListener('pointerdown', onDown);
  card.addEventListener('pointermove', onMove);
  card.addEventListener('pointerup', onUp);
  card.addEventListener('pointercancel', onUp);

  return card;
}

/* ---------- Program switching ---------- */
function renderProgram(key) {
  const prog = PROGRAMS[key];
  currentExercises = prog.exercises;
  document.getElementById('progTitle').textContent = prog.title;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.key === key));
  deck.querySelectorAll('.ex').forEach(c => c.remove());
  prog.exercises.forEach(ex => deck.appendChild(buildCard(ex)));
  restack();
  updateSummary();
}

/* build the tab switcher */
const tabsEl = document.getElementById('tabs');
Object.keys(PROGRAMS).forEach(key => {
  const p = PROGRAMS[key];
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.dataset.key = key;
  btn.innerHTML = `<span class="tab-ic">${p.icon}</span><span class="tab-lbl">${p.label}</span>`;
  btn.addEventListener('click', () => renderProgram(key));
  tabsEl.appendChild(btn);
});

/* ---------- Deck stacking: front card on top, the rest peeking behind ---------- */
const PEEK = 13;   // px of each card's bottom edge visible behind the front card

function restack() {
  const live = [...deck.querySelectorAll('.ex:not(.dismissed)')];
  deck.classList.toggle('empty', live.length === 0);
  const front = live[0];
  const frontH = front ? front.offsetHeight : 0;
  live.forEach((c, d) => {
    c.classList.toggle('front', d === 0);
    if (d === 0) {
      c.style.zIndex = 50;
      c.style.visibility = '';
      if (!c.classList.contains('dragging')) { c.style.transform = ''; c.style.opacity = ''; }
    } else {
      const dd = Math.min(d, 3);
      const scale = 1 - dd * 0.05;
      // place each card so exactly PEEK*dd px of its (white) bottom shows below the front card
      const ty = frontH + dd * PEEK - scale * c.offsetHeight;
      c.style.zIndex = 50 - d;
      c.style.transform = `translateY(${ty}px) scale(${scale})`;
      c.style.opacity = '1';
      c.style.visibility = d > 3 ? 'hidden' : '';
    }
  });
  fitDeck(frontH, live.length);
}

function fitDeck(frontH, n) {
  const front = deck.querySelector('.ex.front');
  if (!front) { deck.style.height = '200px'; return; }
  frontH = frontH || front.offsetHeight;
  n = n || deck.querySelectorAll('.ex:not(.dismissed)').length;
  deck.style.height = (frontH + Math.min(n - 1, 3) * PEEK + 4) + 'px';
}

/* ---------- Daily summary ring ---------- */
const ringFill = document.getElementById('ringFill');
const ringPct = document.getElementById('ringPct');
const doneCount = document.getElementById('doneCount');
const totalCount = document.getElementById('totalCount');
const summarySub = document.getElementById('summarySub');
const CIRC = 169.6;

function updateSummary() {
  const total = currentExercises.length;
  const done = deck.querySelectorAll('.ex.complete').length;
  const pct = total ? Math.round((done/total)*100) : 0;
  ringFill.style.strokeDashoffset = CIRC - (CIRC * pct/100);
  ringPct.textContent = pct + '%';
  doneCount.textContent = done;
  totalCount.textContent = total;
  if (done === 0) summarySub.textContent = 'Tap sets to track reps · swipe a card away when done.';
  else if (done === total) summarySub.textContent = "Program complete — nice work today.";
  else summarySub.textContent = (total - done) + ' to go. Keep it up.';
}

/* ---------- Start ---------- */
renderProgram('knee');
window.addEventListener('resize', fitDeck);
</script>
